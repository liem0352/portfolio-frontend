<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Markdown 文档展示 - LIEM 技术博客">
  <title>Markdown 文档 | LIEM</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/showmd.css">
  <link rel="stylesheet" href="./css/prism.css">
  <link rel="stylesheet" href="./css/prism-line-numbers.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<body class="md-page">
  <!-- 加载动画 -->
  <div class="loader" id="loader">
    <div class="loader__content">
      <div class="loader__spinner"></div>
      <div class="loader__text">LOADING...</div>
    </div>
  </div>

  <div class="md-container">
    <!-- 返回按钮 -->
    <a href="javascript:history.go(-1)" class="md-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      返回
    </a>

    <!-- Markdown 内容容器 -->
    <div id="content"></div>
  </div>

  <script src="./js/jquery.min.js"></script>
  <script src="./js/marked.js"></script>
  <script src="./js/prism.js"></script>
  <script>
    /**
     * 获取 URL 查询参数值
     * @param {string} queryName - 参数名
     * @returns {string|null} 参数值
     */
    function GetQueryValue(queryName) {
      var reg = new RegExp("(^|&)" + queryName + "=([^&]*)(&|$)", "i");
      var r = window.location.search.substr(1).match(reg);
      if (r != null) {
        return decodeURI(r[2]);
      } else {
        return null;
      }
    }

    /**
     * 加载并渲染 Markdown 文件
     */
    function loadMarkdown() {
      var mdFile = GetQueryValue("mdfile");
      
      if (!mdFile) {
        document.getElementById('content').innerHTML = '<p style="text-align:center;color:var(--text-tertiary);">请指定 mdfile 参数</p>';
        hideLoader();
        return;
      }

      $.ajax({
        type: "get",
        url: mdFile,
        async: true,
        dataType: "text",
        success: function (data) {
          // 处理 SQL 语言别名
          data = data.replace(/```mssql/g, "```sql");
          data = data.replace(/```mysql/g, "```sql");

          // 使用 marked 解析 Markdown
          var ht = marked(data);
          
          // 为表格添加样式类
          ht = ht.replace(/<table/g, "<table class='md-table'");

          // 为代码块添加行号
          document.getElementById('content').innerHTML = ht.replace(/<pre/g, "<pre class='line-numbers'");

          // 高亮所有代码块
          $('#content code').each(function () {
            Prism.highlightElement(this);
          });

          // 双击代码块复制功能
          $("[class |='line-numbers language']").dblclick(function () {
            var oInput = document.createElement('textarea');
            oInput.value = $(this).text();
            document.body.appendChild(oInput);
            oInput.select();
            var copyResult = document.execCommand('copy');
            document.body.removeChild(oInput);
            
            if (copyResult) {
              showToast('代码已复制到剪贴板');
            } else {
              showToast('复制失败，请手动复制');
            }
          });

          hideLoader();
        },
        error: function () {
          document.getElementById('content').innerHTML = '<p style="text-align:center;color:var(--error);">加载失败，请检查文件路径</p>';
          hideLoader();
        }
      });
    }

    /**
     * 显示提示消息
     * @param {string} message - 提示消息内容
     */
    function showToast(message) {
      var toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-default);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);z-index:9999;font-size:14px;opacity:0;transition:opacity 0.3s ease;';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(function () {
        toast.style.opacity = '1';
      }, 10);
      
      setTimeout(function () {
        toast.style.opacity = '0';
        setTimeout(function () {
          document.body.removeChild(toast);
        }, 300);
      }, 2000);
    }

    /**
     * 隐藏加载动画
     */
    function hideLoader() {
      var loader = document.getElementById('loader');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(function () {
          loader.style.display = 'none';
        }, 400);
      }
    }

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', loadMarkdown);
  </script>
</body>

</html>
