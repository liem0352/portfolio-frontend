<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="100" viewBox="0 0 1200 100"
     role="img" aria-labelledby="title2 desc2">
  <title id="title2">功能页面</title>
  <desc id="desc2">Pages section header</desc>

  <defs>
    <linearGradient id="secTextGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="secGlass2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>
    <pattern id="secGrid2" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="100" rx="18" fill="url(#secGlass2)"/>
  <rect width="1200" height="100" rx="18" fill="url(#secGrid2)"/>

  <g transform="translate(40 32)">
    <rect x="0" y="0" width="44" height="36" rx="10"
