    <text x="22" y="24" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" font-weight="600" fill="#a78bfa">
      02
    </text>
  </g>

  <text x="104" y="44"
