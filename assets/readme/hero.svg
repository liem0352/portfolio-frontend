<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="360" viewBox="0 0 1200 360"
     role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Frontend — 玻璃态个人作品集网站</title>
  <desc id="desc">采用 Glass Morphism 设计的现代化个人作品集网站，纯 HTML/CSS/JS 构建，支持深浅双主题切换与 Canvas 动态背景。</desc>

  <defs>
    <!-- 背景径向渐变 -->
    <radialGradient id="bgGlow" cx="85%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#5b9eff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <!-- 玻璃填充 -->
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- 玻璃高光边框 -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- 主色渐变文字 -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#5b9eff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <!-- 模糊滤镜（模拟玻璃效果） -->
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" />
    </filter>

    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="360" rx="26" fill="#0d1117"/>
  <rect width="1200" height="360" rx="26" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="26" fill="url(#bgGlow)"/>

  <!-- 散落的星光粒子 -->
  <g fill="#5b9eff" opacity="0.6">
    <circle cx="80" cy="60" r="1.5"/>
    <circle cx="160" cy="290" r="1"/>
    <circle cx="320" cy="50" r="1.2"/>
    <circle cx="450" cy="310" r="0.8"/>
    <circle cx="520" cy="80" r="1"/>
    <circle cx="680" cy="300" r="1.3"/>
    <circle cx="900" cy="50" r="1"/>
    <circle cx="1100" cy="280" r="1.5"/>
    <circle cx="1050" cy="100" r="0.9"/>
  </g>

  <!-- 左侧：标题区 -->
  <g transform="translate(56 56)">
    <!-- Category tag -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="170" height="28" rx="14"
            fill="url(#glassFill)" stroke="url(#glassBorder)" stroke-width="1"/>
      <text x="14" y="18"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#60a5fa" letter-spacing="0.5">
        PORTFOLIO · v2.0
      </text>
    </g>

    <!-- 主标题 -->
    <text x="0" y="82"
          font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif"
          font-size="46" font-weight="700" fill="#f0f6fc">
      Glass Portfolio
    </text>
    <text x="0" y="124"
          font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif"
          font-size="46" font-weight="700" fill="url(#textGrad)">
      玻璃态作品集
    </text>

    <!-- 描述 -->
    <text x="0" y="162"
          font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif"
          font-size="15" fill="#8b949e">
      采用 Glass Morphism 设计语言的现代化个人作品集网站
    </text>
    <text x="0" y="184"
          font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif"
          font-size="15" fill="#8b949e">
      纯 HTML / CSS / JavaScript 构建 · 零构建工具依赖
    </text>

    <!-- 特性标签 -->
    <g transform="translate(0 216)">
      <g>
        <rect x="0" y="0" width="88" height="26" rx="13"
              fill="rgba(91, 158, 255, 0.12)" stroke="rgba(91, 158, 255, 0.3)" stroke-width="1"/>
        <text x="14" y="17"
              font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
              font-size="11" fill="#93c5fd">
          Glass UI
        </text>
      </g>
      <g transform="translate(100 0)">
        <rect x="0" y="0" width="96" height="26" rx="13"
              fill="rgba(167, 139, 250, 0.10)" stroke="rgba(167, 139, 250, 0.28)" stroke-width="1"/>
        <text x="14" y="17"
              font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
              font-size="11" fill="#c4b5fd">
          Dark / Light
        </text>
      </g>
      <g transform="translate(208 0)">
        <rect x="0" y="0" width="108" height="26" rx="13"
              fill="rgba(255, 255, 255, 0.06)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1"/>
        <text x="14" y="17"
              font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
              font-size="11" fill="#8b949e">
          Canvas 动画
        </text>
      </g>
    </g>
  </g>

  <!-- 右侧：玻璃卡片展示区 -->
  <g filter="url(#cardShadow)">
    <!-- 大卡片（个人信息卡） -->
    <g transform="translate(700 50)">
      <rect x="0" y="0" width="220" height="200" rx="20"
            fill="url(#glassFill)" stroke="url(#glassBorder)" stroke-width="1"/>
      <!-- 头像 -->
      <circle cx="110" cy="55" r="28" fill="#1e293b" stroke="#5b9eff" stroke-width="1.5" opacity="0.8"/>
      <circle cx="110" cy="55" r="24" fill="#334155" opacity="0.5"/>
      <!-- 名字 -->
      <rect x="75" y="94" width="70" height="10" rx="5" fill="#e2e8f0" opacity="0.7"/>
      <!-- 描述 -->
      <rect x="55" y="112" width="110" height="8" rx="4" fill="#64748b" opacity="0.4"/>
      <!-- 分隔线 -->
      <rect x="24" y="132" width="172" height="1" fill="#ffffff" opacity="0.08"/>
      <!-- 社交图标 -->
      <g transform="translate(82 148)" fill="#64748b" opacity="0.6">
        <circle cx="0" cy="0" r="8"/>
        <circle cx="28" cy="0" r="8"/>
        <circle cx="56" cy="0" r="8"/>
      </g>
      <!-- 底部信息 -->
      <g transform="translate(24 176)" fill="#64748b" font-size="9" font-family="monospace">
        <text x="0" y="0" opacity="0.7">院校</text>
        <text x="60" y="0" opacity="0.4">University</text>
      </g>
    </g>

    <!-- 小卡片 1（统计卡，叠在大卡上方左侧） -->
    <g transform="translate(650 80)">
      <rect x="0" y="0" width="110" height="72" rx="14"
            fill="url(#glassFill)" stroke="url(#glassBorder)" stroke-width="1"/>
      <text x="16" y="30"
            font-family="system-ui, -apple-system, sans-serif"
            font-size="22" font-weight="700" fill="#93c5fd">
        6+
      </text>
      <text x="16" y="50"
            font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
            font-size="10" fill="#64748b">
        功能页面
      </text>
    </g>

    <!-- 小卡片 2（技能卡，叠在大卡下方右侧） -->
    <g transform="translate(860 220)">
      <rect x="0" y="0" width="128" height="78" rx="14"
            fill="url(#glassFill)" stroke="url(#glassBorder)" stroke-width="1"/>
      <text x="16" y="22"
            font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
            font-size="10" fill="#64748b">
        前端
      </text>
      <!-- 进度条 -->
      <rect x="16" y="30" width="96" height="6" rx="3" fill="#1e293b"/>
      <rect x="16" y="30" width="72" height="6" rx="3" fill="#5b9eff" opacity="0.8"/>
      <text x="16" y="56"
            font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
            font-size="10" fill="#64748b">
        后端
      </text>
      <rect x="16" y="64" width="96" height="6" rx="3" fill="#1e293b"/>
      <rect x="16" y="64" width="48" height="6" rx="3" fill="#a78bfa" opacity="0.8"/>
    </g>

    <!-- 主题切换指示器 -->
    <g transform="translate(890 40)">
      <rect x="0" y="0" width="44" height="24" rx="12"
            fill="rgba(91, 158, 255, 0.2)" stroke="rgba(91, 158, 255, 0.4)" stroke-width="1"/>
      <circle cx="32" cy="12" r="8" fill="#5b9eff"/>
    </g>
  </g>

  <!-- 底部蝴蝶剪影（呼应原项目蝴蝶加载动画） -->
  <g transform="translate(1080 280)" opacity="0.15" fill="#5b9eff">
    <path d="M0 0 C -8 -10 -20 -8 -22 0 C -20 8 -8 10 0 0 Z"/>
    <path d="M0 0 C 8 -10 20 -8 22 0 C 20 8 8 10 0 0 Z"/>
    <ellipse cx="0" cy="0" rx="2" ry="8" fill="#3b82f6"/>
  </g>
</svg>
