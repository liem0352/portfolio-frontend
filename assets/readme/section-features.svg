<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="100" viewBox="0 0 1200 100"
     role="img" aria-labelledby="title1 desc1">
  <title id="title1">设计特色</title>
  <desc id="desc1">Design Highlights section header</desc>

  <defs>
    <linearGradient id="secTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#5b9eff"/>
    </linearGradient>
    <linearGradient id="secGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>
    <pattern id="secGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 背景条 -->
  <rect width="1200" height="100" rx="18" fill="url(#secGlass)"/>
  <rect width="1200" height="100" rx="18" fill="url(#secGrid)"/>

  <!-- 左侧编号 -->
  <g transform="translate(40 32)">
    <rect x="0" y="0" width="44" height="36" rx="10"
          fill="rgba(91, 158, 255, 0.12)" stroke="rgba(91, 158, 255, 0.3)" stroke-width="1"/>
    <text x="22" y="24" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" font-weight="600" fill="#60a5fa">
      01
    </text>
  </g>

  <!-- 标题 -->
  <text x="104" y="44"
        font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif"
        font-size="22" font-weight="600" fill="#f0f6fc">
    设计特色
  </text>
  <text x="104" y="66"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="12" fill="#6e7681">
    Design Highlights · 玻璃态设计语言 · 双主题系统 · Canvas 动画
  </text>

  <!-- 右侧装饰线 -->
  <g transform="translate(0 50)" opacity="0.3">
    <line x1="360" y1="0" x2="1160" y2="0" stroke="#5b9eff" stroke-width="1" stroke-dasharray="4 6"/>
  </g>

  <!-- 星光点缀 -->
  <g fill="#5b9eff" opacity="0.5">
    <circle cx="1120" cy="35" r="1.2"/>
    <circle cx="1150" cy="60" r="0.8"/>
  </g>
</svg>
